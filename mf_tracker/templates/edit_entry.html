{% extends "base.html" %}

{% block title %}Edit Entry | {{ fund.name }}{% endblock %}

{% block content %}
<section class="section-head reveal">
  <div>
    <h1>Edit Entry</h1>
    <p>{{ fund.name }} - {{ entry.date.strftime('%d/%m/%Y') }}</p>
  </div>
  <a class="btn subtle" href="{{ url_for('web.fund_detail', fund_id=fund.id) }}">Back to Fund</a>
</section>

<section class="glass-card reveal">
  <form action="{{ url_for('web.update_entry', fund_id=fund.id, entry_id=entry.id) }}" method="post" class="form-grid two-col">
    <label>
      Date
      <input type="date" name="date" value="{{ entry.date.strftime('%Y-%m-%d') }}" required />
    </label>
    <label>
      Principal
      <input type="number" name="principal" step="0.01" value="{{ '%.2f'|format(entry.principal) }}" required />
    </label>
    <label>
      Current Value
      <input type="number" name="current_value" step="0.01" value="{{ '%.2f'|format(entry.current_value) }}" required />
    </label>
    <label>
      Gains
      <input type="number" name="gains" step="0.01" value="{{ '%.2f'|format(entry.gains) }}" />
    </label>
    <label>
      Gains %
      <input type="number" name="gains_percent" step="0.01" value="{{ '%.2f'|format(entry.gains_percent) }}" />
    </label>
    <div class="actions full-width">
      <a class="btn subtle" href="{{ url_for('web.fund_detail', fund_id=fund.id) }}">Cancel</a>
      <button type="submit" class="btn primary">Update Entry</button>
    </div>
  </form>
</section>
{% endblock %}
